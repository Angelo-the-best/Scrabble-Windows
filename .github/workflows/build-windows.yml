name: Build Windows EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile
        run: javac -d out *.java

      - name: Copy resources
        run: |
          xcopy /E /I resources\Images out\images
          copy resources\Words.txt out\Words.txt

      - name: Create JAR
        shell: powershell
        run: |
          New-Item -Path out\manifest.txt -ItemType File -Force
          Set-Content -Path out\manifest.txt -Value "Main-Class: PlayerLogic"
          cd out
          jar cfm Scrabble.jar manifest.txt *.class images Words.txt
          cd ..

      - name: Package EXE
        shell: powershell
        run: |
          jpackage `
            --input out `
            --name Scrabble `
            --main-jar Scrabble.jar `
            --main-class PlayerLogic `
            --type exe `
            --icon icon.ico `
            --win-dir-chooser `
            --win-shortcut `
            --java-options "-Dsun.java2d.uiScale=1" `
            --java-options "-Dsun.java2d.dpiaware=true"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Scrabble-Windows-EXE
          path: "*.exe"
